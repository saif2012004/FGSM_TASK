name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
      
      - name: Run linting
        run: |
          pip install flake8
          cd backend
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=data,__pycache__
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics --exclude=data,__pycache__
        continue-on-error: true
      
      - name: Check if tests directory exists
        id: check_tests
        run: |
          if [ -d "backend/tests" ]; then
            echo "tests_exist=true" >> $GITHUB_OUTPUT
          else
            echo "tests_exist=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Run tests
        if: steps.check_tests.outputs.tests_exist == 'true'
        run: |
          cd backend
          pytest --cov=. --cov-report=xml --cov-report=term
        continue-on-error: true

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Run linting
        run: |
          cd frontend
          npm run lint
        continue-on-error: true
      
      - name: Build application
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Check for large files
        run: |
          echo "Checking for files larger than 10MB..."
          find . -type f -size +10M -not -path "*/node_modules/*" -not -path "*/.git/*" -not -path "*/data/*" | tee large_files.txt
          if [ -s large_files.txt ]; then
            echo "Warning: Large files found"
            cat large_files.txt
          else
            echo "No large files found"
          fi
        continue-on-error: true
      
      - name: Check Python code formatting
        uses: psf/black@stable
        with:
          options: "--check --verbose --exclude='data|__pycache__|\.git'"
          src: "./backend"
        continue-on-error: true
